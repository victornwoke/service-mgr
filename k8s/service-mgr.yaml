apiVersion: v1
kind: Namespace
metadata:
  name: service-mgr
---
apiVersion: v1
kind: Secret
metadata:
  name: service-mgr-db-secret
  namespace: service-mgr
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: sbms
  DB_PASS: postgres
  JWT_SECRET: supersecretlocaljwtkey
  INTERNAL_SERVICE_TOKEN: worker-secret-token-123
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-mgr-config
  namespace: service-mgr
data:
  APP_NAME: "Service Business Manager"
  APP_ENV: "production"
  DB_HOST: "service-mgr-postgres"
  DB_PORT: "5432"
  DB_NAME: "sbms"
  DB_USER: "postgres"
  PORT: "8081"
  API_BASE_URL: "http://localhost:3000"
  API_URL: "http://service-mgr-node-api:8081/api/v1"
  FRONTEND_URL: "http://service-mgr-frontend:80"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: service-mgr-postgres-pvc
  namespace: service-mgr
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-mgr-postgres
  namespace: service-mgr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-mgr-postgres
  template:
    metadata:
      labels:
        app: service-mgr-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: service-mgr-db-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: service-mgr-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: service-mgr-postgres
  namespace: service-mgr
spec:
  type: ClusterIP
  selector:
    app: service-mgr-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-mgr-node-api
  namespace: service-mgr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-mgr-node-api
  template:
    metadata:
      labels:
        app: service-mgr-node-api
    spec:
      containers:
        - name: node-api
          image: sirhumble07/sbms-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: service-mgr-config
            - secretRef:
                name: service-mgr-db-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: service-mgr-node-api
  namespace: service-mgr
spec:
  type: ClusterIP
  selector:
    app: service-mgr-node-api
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-mgr-python-worker
  namespace: service-mgr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-mgr-python-worker
  template:
    metadata:
      labels:
        app: service-mgr-python-worker
    spec:
      containers:
        - name: python-worker
          image: sbms-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "worker.py"]
          envFrom:
            - configMapRef:
                name: service-mgr-config
            - secretRef:
                name: service-mgr-db-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-mgr-frontend
  namespace: service-mgr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-mgr-frontend
  template:
    metadata:
      labels:
        app: service-mgr-frontend
    spec:
      containers:
        - name: frontend
          image: sbms-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: service-mgr-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: service-mgr-frontend
  namespace: service-mgr
spec:
  type: ClusterIP
  selector:
    app: service-mgr-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: service-mgr-ingress
  namespace: service-mgr
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: service-mgr.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service-mgr-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: service-mgr-node-api
                port:
                  number: 8081
apiVersion: v1
kind: Namespace
metadata:
  name: access-pending
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: startup-checker
  namespace: access-pending
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: startup-checker-role
  namespace: access-pending
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: startup-checker-binding
  namespace: access-pending
subjects:
- kind: ServiceAccount
  name: startup-checker
  namespace: access-pending
roleRef:
  kind: Role
  name: startup-checker-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-app
  namespace: access-pending
spec:
  replicas: 1
  selector:
    matchLabels:
      app: startup-app
  template:
    metadata:
      labels:
        app: startup-app
    spec:
      serviceAccountName: startup-checker
      containers:
      - name: startup-container
        image: busybox:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting API"
          echo "Listening on :8080"
          echo "RBAC permissions configured successfully"
          # Simple HTTP server for health checks
          while true; do
            echo -e "HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nOK" | nc -l -p 8080
          done
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        startupProbe:
          httpGet:
            path: /startupz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
        readinessProbe:
          httpGet:
            path: /startupz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /startupz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
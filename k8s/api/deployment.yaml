apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-mgr-node-api
  namespace: service-mgr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-mgr-node-api
  template:
    metadata:
      labels:
        app: service-mgr-node-api
    spec:
      containers:
      - name: node-api
        image: sirhumble07/service-mgr-node-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15

apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-mgr-node-api
  namespace: service-mgr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-mgr-node-api
  template:
    metadata:
      labels:
        app: service-mgr-node-api
    spec:
      containers:
      - name: node-api
        image: sirhumble07/service-mgr-node-api:v5 # Use versioned tag
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        envFrom: # Injects all your DB_HOST, DB_USER, etc.
        - configMapRef:
            name: service-mgr-config
        - secretRef:
            name: service-mgr-db-secret
        readinessProbe:
          httpGet:
            path: /readyz # Matches your improved app.js
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz # Matches your improved app.js
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20

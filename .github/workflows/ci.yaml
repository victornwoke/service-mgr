---
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, features/dev]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GITOPS_REPO: ${{ github.repository }}-gitops

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      api-image: ${{ steps.meta-backend.outputs.tags }}
      worker-image: ${{ steps.meta-worker.outputs.tags }}
      commit-sha-short: ${{ steps.commit.outputs.short_sha }}
      commit-sha-full: ${{ steps.commit.outputs.full_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get commit SHA
        id: commit
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "full_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=sha,format=long,prefix={{branch}}-sha-
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=sha,format=long,prefix={{branch}}-sha-
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=sha,format=long,prefix={{branch}}-sha-
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-react
          file: ./frontend-react/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-node
          file: ./backend-node/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker-python
          file: ./worker-python/Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend-node/package-lock.json'

      - name: Install backend dependencies
        run: cd backend-node && npm ci

      - name: Run backend tests
        run: cd backend-node && npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend-react/package-lock.json'

      - name: Install frontend dependencies
        run: cd frontend-react && npm ci

      - name: Run frontend tests
        run: |
          cd frontend-react
          npm run test:ci || echo "Frontend tests not configured, skipping"

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-and-test, test, security-scan]
    if: >
      github.ref == 'refs/heads/develop' ||
      github.event_name == 'workflow_dispatch'
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update GitOps manifests for staging
        run: |
          # Clone gitops repository
          git clone \
            https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ env.GITOPS_REPO }}.git \
            gitops  # yamllint disable-line line-length
          cd gitops

          # Update image tags for staging
          SHORT_SHA="${{ needs.build-and-test.outputs.commit-sha-short }}"
          FULL_SHA="${{ needs.build-and-test.outputs.commit-sha-full }}"
          BRANCH_NAME="${{ github.ref_name }}"

          # Update staging values with immutable SHA-based tags
          cat > environments/staging/values.yaml << EOF
          global:
            environment: staging
            commitSha: "${FULL_SHA}"

          frontend:
            image:
              tag: "${BRANCH_NAME}-sha-${FULL_SHA}"

          api:
            image:
              tag: "${BRANCH_NAME}-sha-${FULL_SHA}"

          worker:
            image:
              tag: "${BRANCH_NAME}-sha-${FULL_SHA}"

          ingress:
            hosts:
              - host: staging.service-mgr.local
                paths:
                  - path: /
                    pathType: Prefix
                  - path: /api
                    pathType: Prefix
          EOF

          # Commit and push changes
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Deploy ${FULL_SHA} (${SHORT_SHA}) to staging" \
            || echo "No changes to commit"
          git push

      - name: Wait for ArgoCD sync
        run: |
          echo "Waiting for ArgoCD to sync staging deployment..."
          # In a real environment, you would poll ArgoCD API here
          sleep 60

      - name: Validate staging deployment
        run: |
          # For now, just check if ArgoCD reports success
          # In production, you would call your validation script
          echo "Staging deployment completed"
          echo "ArgoCD will automatically sync the new images"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-test, test, security-scan]
    if: >
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.environment == 'production')
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update GitOps manifests for production
        run: |
          # Clone gitops repository
          git clone \
            https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ env.GITOPS_REPO }}.git \
            gitops  # yamllint disable-line line-length
          cd gitops

          # Update image tags for production
          SHORT_SHA="${{ needs.build-and-test.outputs.commit-sha-short }}"
          FULL_SHA="${{ needs.build-and-test.outputs.commit-sha-full }}"

          # Update production values with immutable SHA-based tags
          cat > environments/production/values.yaml << EOF
          global:
            environment: production
            commitSha: "${FULL_SHA}"

          frontend:
            image:
              tag: "main-sha-${FULL_SHA}"
            replicaCount: 3

          api:
            image:
              tag: "main-sha-${FULL_SHA}"
            replicaCount: 3

          worker:
            image:
              tag: "main-sha-${FULL_SHA}"
            replicaCount: 2

          postgresql:
            auth:
              postgresPassword: "${{ secrets.DB_POSTGRES_PASSWORD }}"
              username: "${{ secrets.DB_USERNAME }}"
              password: "${{ secrets.DB_PASSWORD }}"
              database: "${{ secrets.DB_NAME }}"

          ingress:
            hosts:
              - host: service-mgr.local
                paths:
                  - path: /
                    pathType: Prefix
                  - path: /api
                    pathType: Prefix
            tls:
              - secretName: service-mgr-tls
                hosts:
                  - service-mgr.local
          EOF

          # Commit and push changes
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Deploy ${FULL_SHA} (${SHORT_SHA}) to production" \
            || echo "No changes to commit"
          git push

      - name: Wait for ArgoCD sync
        run: |
          echo "Waiting for ArgoCD to sync production deployment..."
          # In production, implement proper ArgoCD sync checking
          sleep 120

      - name: Validate production deployment
        run: |
          echo "Production deployment initiated"
          echo "ArgoCD will automatically sync the new images"
          echo "Monitor deployment status in ArgoCD dashboard"

  notify:
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - test
      - security-scan
      - deploy-staging
      - deploy-production
    if: always()

    steps:
      - name: Send deployment notification
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" == "true" ]; then
            echo "CI/CD Pipeline failed. Check logs for details."
            # Add Slack/Discord notification here
          else
            echo "CI/CD Pipeline completed successfully!"
            echo "Images built and pushed to GitHub Container Registry"
            echo "Tests passed"
            echo "Security scan completed"
            if [ "${{ github.ref == 'refs/heads/main' }}" == "true" ]; then
              echo "Deployed to production via ArgoCD"
            elif [ "${{ github.ref == 'refs/heads/develop' }}" == "true" ]; then
              echo "Deployed to staging via ArgoCD"
            fi
            # Add Slack/Discord notification here
          fi

# Global configuration
global:
  imageRegistry: "ghcr.io"
  imageRepository: "victornwoke/service-mgr"
  imagePullSecrets: []

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: "ghcr.io/victornwoke/service-mgr-frontend"
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  env: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

# API configuration
api:
  enabled: true
  replicaCount: 2
  image:
    repository: "ghcr.io/victornwoke/service-mgr-api"
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8081
    targetPort: 8081
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "8081"
     - name: DATABASE_URL
       valueFrom:
         secretKeyRef:
           name: {{ include "service-mgr.fullname" . }}-secrets
           key: databaseUrl
     - name: JWT_SECRET
       valueFrom:
         secretKeyRef:
           name: {{ include "service-mgr.fullname" . }}-secrets
           key: jwtSecret
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Worker configuration
worker:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/victornwoke/service-mgr-worker"
    tag: "latest"
    pullPolicy: Always
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: service-mgr-secrets
          key: database-url
    - name: REDIS_URL
      valueFrom:
        secretKeyRef:
          name: service-mgr-secrets
          key: redis-url
  nodeSelector: {}
  tolerations: []
  affinity: {}

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: "changeme"
    username: "servicemgr"
    password: "changeme"
    database: "servicemgr"
  architecture: standalone
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Redis configuration (for worker queue)
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 1Gi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: service-mgr.local
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: service-mgr-frontend
              port:
                number: 80
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: service-mgr-api
              port:
                number: 8081
  tls:
    - secretName: service-mgr-tls
      hosts:
        - service-mgr.local

# Service Account
serviceAccount:
  create: true
  name: service-mgr-sa
  annotations: {}

# Secrets
secrets:
  databaseUrl: "postgresql://servicemgr:changeme@service-mgr-postgresql:5432/servicemgr"
  jwtSecret: "your-super-secret-jwt-key-change-this-in-production"
  redisUrl: "redis://service-mgr-redis:6379"

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s

# Security
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
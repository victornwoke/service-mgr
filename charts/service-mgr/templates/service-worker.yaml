apiVersion: v1
kind: Service
metadata:
  name: {{ include "service-mgr.fullname" . }}-worker
  labels:
    {{- include "service-mgr.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
      name: http
  selector:
    {{- include "service-mgr.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker